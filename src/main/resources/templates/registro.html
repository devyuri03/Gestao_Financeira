<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta — Gestão Financeira</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="/css/auth.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<div class="wrapper">

    <!-- ── Painel esquerdo ── -->
    <div class="left-panel">
        <div class="brand">
            <div class="brand-icon">
                <i class="ti ti-pig-money"></i>
            </div>
            <span class="brand-name">Gestão Financeira</span>
        </div>

        <div class="hero-text">
            <h1>Comece sua<br>jornada<br>financeira</h1>
            <p>Crie sua conta gratuita e tenha controle total sobre suas finanças pessoais.</p>
        </div>

        <div class="deco-cards">
            <div class="deco-card">
                <div class="deco-card-label">Meta de economia</div>
                <div class="deco-card-value positive">R$ 5.000,00</div>
                <div class="deco-card-bar">
                    <div class="deco-card-bar-fill" style="width: 42%"></div>
                </div>
            </div>
            <div class="deco-card deco-card-sm">
                <div class="deco-card-label">Progresso</div>
                <div class="deco-card-value positive">42% concluído</div>
            </div>
        </div>
    </div>

    <!-- ── Painel direito ── -->
    <div class="right-panel">
        <div class="form-card">

            <div class="form-header">
                <h2>Criar conta</h2>
                <p>Preencha os dados para começar</p>
            </div>

            <form id="registroForm" onsubmit="return false;">
                <div class="field">
                    <label for="email">Email</label>
                    <div class="input-wrap">
                        <i class="ti ti-mail"></i>
                        <input type="email" id="email"
                               placeholder="seu@email.com" required autocomplete="email">
                    </div>
                </div>

                <div class="field">
                    <label for="senha">Senha</label>
                    <div class="input-wrap">
                        <i class="ti ti-lock"></i>
                        <input type="password" id="senha"
                               placeholder="••••••••" required autocomplete="new-password">
                    </div>
                </div>

                <div class="error-msg" id="errorMsg">
                    <i class="ti ti-alert-circle"></i>
                    Erro ao criar conta. Tente novamente.
                </div>

                <button type="button" class="btn-submit" onclick="realizarRegistro()">
                    Criar conta
                    <i class="ti ti-arrow-right"></i>
                </button>
            </form>

            <p class="alt-link">
                Já tem uma conta? <a href="/login">Fazer login</a>
            </p>

        </div>
    </div>

</div>

<script src="/js/app.js"></script>

</body>
</html>
