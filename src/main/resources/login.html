<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestão Financeira</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div class="login-container">
        <div class="left-panel">
            <h1>Gestão de Gastos Pessoais</h1>
            <p>Controle suas finanças de forma simples e intuitiva.</p>
        </div>

        <div class="right-panel">
            <h2>Sign-in</h2>
            <form id="loginForm">
                <input type="email" name="username" placeholder="Email" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="button" onclick="realizarLogin()">Login</button>
            </form>
            <p>Don't have an account? <a href="/registro">Signup Here</a></p>
        </div>
    </div>

    <script src="/js/app.js"></script>

</body>
</html>
