<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Criar Conta - Gestão Financeira</title>
    <link rel="stylesheet" href="/css/auth.css"> </head>
<body>

<div class="login-container">
    <div class="left-panel">
        <h1>Junte-se a nós</h1>
        <p>Crie sua conta e comece a controlar suas finanças.</p>
    </div>

    <div class="right-panel">
        <h2>Criar Conta</h2>
        <form id="registroForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="senha" placeholder="Senha" required>
            <button type="button" onclick="realizarRegistro()">Cadastrar</button>
        </form>
        <p>Já tem uma conta? <a href="/login.html">Fazer login</a></p>
    </div>
</div>

<script src="/js/app.js"></script> </body>
</html>
