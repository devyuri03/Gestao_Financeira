services:
  - type: web
    name: gestao-financeira
    runtime: docker
    rootDir: .
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: gestao-financeira-db
          property: connectionString

databases:
  - name: gestao-financeira-db
    plan: free